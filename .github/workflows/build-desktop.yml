name: Build Desktop (Windows + Linux)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run electron:build:win
      - uses: actions/upload-artifact@v4
        with:
          name: onjeom-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run electron:build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: onjeom-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/latest-linux.yml

  # Android is still "in progress" product-wise; do not block desktop release.
  android-debug:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build:android-web
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: onjeom-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

  # Tag push (v*) → create/update the GitHub Release with desktop (and optional Android) outputs.
  # windows + linux must succeed; android may fail (continue-on-error).
  release:
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.windows.result == 'success' && needs.linux.result == 'success'
    needs: [windows, linux, android-debug]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets
      - name: List release assets
        run: ls -laR release-assets || true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
          fail_on_unmatched_files: false
          name: ${{ github.ref_name }} — Onjeom desktop
          body: |
            ## Onjeom ${{ github.ref_name }}

            Multi-format document viewer with freehand annotation (Windows · Linux · Android WIP).

            ### Highlights
            - Formats: **MD · TXT/ASC · HTML · PDF · DOCX · PPTX · EPUB**
            - Encrypted PDF open · password-protected annotated PDF export
            - Hangul/CJK-safe PDF export (canvas path)
            - Annotations never rewrite the source file (sidecar + export merges into a new PDF)
            - Sidebar sync status (saving / saved / failed + Retry)
            - TOC navigation · library remove without deleting disk files
            - 20 UI languages · vitest + CI coverage

            ### Windows
            - **Onjeom-*-win-x64.exe** — NSIS installer
            - **Onjeom-*-win-portable.exe** — portable

            ### Linux (x64)
            - **Onjeom-*-linux-x86_64.AppImage**
            - **Onjeom-*-linux-amd64.deb**
            - **Onjeom-*-linux-x64.tar.gz**

            Use **${{ github.ref_name }} or newer**.
            Docs: [README](https://github.com/simhanson123/Onjeom_Doc_Viewer#readme) · [docs/en](https://github.com/simhanson123/Onjeom_Doc_Viewer/tree/main/docs/en)
